name: Feature
description: Propose a feature with explicit scope, acceptance, and dependencies.
title: "[Feature] "
labels:
  - type:feature
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What outcome should this feature create?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in the first implementation?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete pass/fail criteria
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Related issues, docs, or blockers
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: What should not be included?
