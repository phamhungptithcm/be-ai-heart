name: Release Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/**
      - apps/docs/**
      - .github/workflows/release-docs.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: release-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static docs bundle
        run: |
          npm install --no-save marked@16.4.1
          node --input-type=module <<'EOF'
          import fs from "node:fs/promises";
          import path from "node:path";
          import { marked } from "marked";

          const docsDir = "docs";
          const outDir = ".site/docs";
          const files = (await fs.readdir(docsDir))
            .filter((name) => name.endsWith(".md"))
            .sort();

          await fs.rm(outDir, { recursive: true, force: true });
          await fs.mkdir(outDir, { recursive: true });

          const shell = (title, body) => `<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>${title}</title>
            <style>
              body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
              main { max-width: 860px; margin: 0 auto; padding: 48px 20px 64px; }
              article { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 32px; }
              a { color: #0f766e; text-decoration: none; }
              a:hover { text-decoration: underline; }
              code, pre { background: #f3f4f6; border-radius: 8px; }
              pre { padding: 12px; overflow: auto; }
            </style>
          </head>
          <body><main>${body}</main></body></html>`;

          const links = files
            .map((name) => `<li><a href="./${name.replace(/\\.md$/, ".html")}">${name}</a></li>`)
            .join("");

          await fs.writeFile(
            path.join(outDir, "index.html"),
            shell(
              "be-ai-heart docs",
              `<article><h1>be-ai-heart docs</h1><ul>${links}</ul></article>`,
            ),
          );

          for (const name of files) {
            const markdown = await fs.readFile(path.join(docsDir, name), "utf8");
            const html = marked.parse(markdown);
            await fs.writeFile(
              path.join(outDir, name.replace(/\\.md$/, ".html")),
              shell(name, `<article><p><a href="./index.html">Back to docs index</a></p>${html}</article>`),
            );
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.site/docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
