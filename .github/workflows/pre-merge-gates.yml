name: Pre-Merge Gates

on:
  pull_request:
    branches:
      - staging
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pre-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  branch-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce staging promotion into main
        run: |
          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "staging" ]; then
            echo "Only the staging branch may be merged into main."
            exit 1
          fi

  validate:
    if: ${{ !github.event.pull_request.draft }}
    needs: branch-policy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit and integration tests
        run: npm run test

      - name: Basic E2E smoke
        run: npm run e2e
