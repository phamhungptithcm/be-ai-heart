name: Release Website

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/website/**
      - .github/workflows/release-website.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-website
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate website build
        run: npm run website:build
        env:
          NEXT_PUBLIC_BE_AI_HEART_API_BASE_URL: ${{ vars.BE_AI_HEART_API_BASE_URL }}
          NEXT_PUBLIC_BE_AI_HEART_WEBSITE_BASE_URL: ${{ vars.BE_AI_HEART_WEBSITE_BASE_URL }}
          NEXT_PUBLIC_BE_AI_HEART_PORTAL_BASE_URL: ${{ vars.BE_AI_HEART_PORTAL_BASE_URL }}

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Trigger App Hosting rollout
        run: |
          firebase apphosting:rollouts:create "${{ vars.FIREBASE_BACKEND_WEBSITE }}" \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --git_commit "${{ github.sha }}"
