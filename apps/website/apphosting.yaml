# Settings for the website App Hosting backend.
# Configure per-environment public URLs in the backend before the first rollout:
# - NEXT_PUBLIC_BE_AI_HEART_API_BASE_URL
# - NEXT_PUBLIC_BE_AI_HEART_PORTAL_BASE_URL
# - NEXT_PUBLIC_BE_AI_HEART_WEBSITE_BASE_URL
# Optional client config:
# - NEXT_PUBLIC_FIREBASE_API_KEY
# - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
# - NEXT_PUBLIC_FIREBASE_PROJECT_ID
# - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
# - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
# - NEXT_PUBLIC_FIREBASE_APP_ID
# - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 20
  cpu: 1
  memoryMiB: 512
