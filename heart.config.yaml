project:
  name: be-ai-heart
  language_priority:
    - typescript
    - javascript
  entrypoints:
    - packages
    - apps
    - services
  ignore:
    - node_modules
    - dist
    - build
    - out
    - coverage
    - vendor
    - .git
    - .worktrees
    - .next
    - .cache
    - .turbo
    - .vercel
    - .parcel-cache
    - output
    - .playwright-cli
    - playwright-report
    - .heart/benchmarks
    - .heart/cache
    - .heart/diagrams
    - .heart/published
policies:
  rules_file: .heart/policies.yaml
indexing:
  incremental: true
  embeddings: disabled
knowledge:
  document_paths:
    - docs
mcp:
  enabled_tools:
    - project_overview
    - symbol_lookup
    - dependency_explain
    - context_pack
    - domain_pack_list
    - domain_pack_get
    - domain_pack_layers
    - domain_pack_build_options
    - domain_pack_generate
    - domain_pack_validate
    - domain_pack_conflicts
    - domain_pack_context
    - domain_pack_benchmark_scenarios
    - stack_preset_list
    - domain_project_plan
    - domain_project_generate
    - impact_analysis
    - document_search
    - docs_search
    - policy_check
    - benchmark_summary
